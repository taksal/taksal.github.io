<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SADA – Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Inter', sans-serif;
        text-align: center;
        color: white;
        overflow: hidden;
    }

    .wrapper {
        animation: fadeIn 1.4s ease;
        padding: 20px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
        width: 260px;
        height: auto;
        margin-bottom: 25px;
        filter: none; /* No background glow */
    }

    h1 {
        font-size: 3.6rem;
        font-weight: 900;
        margin: 0;
        background: linear-gradient(90deg, #00eaff, #ae00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .coming-soon {
        margin-top: 18px;
        font-size: 1.8rem;
        font-weight: 300;
        opacity: 0.85;
        letter-spacing: 2px;
        animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
        0%   { opacity: 0.4; }
        50%  { opacity: 1; }
        100% { opacity: 0.4; }
    }

    .tagline {
        margin-top: 12px;
        font-size: 1.2rem;
        opacity: 0.6;
        font-weight: 300;
    }

    /* Elegant gradient line */
    .line {
        width: 160px;
        height: 2px;
        background: linear-gradient(90deg, #00eaff, #ae00ff);
        margin: 35px auto 0 auto;
        border-radius: 20px;
        opacity: 0.65;
        animation: glowLine 4s ease-in-out infinite;
    }

    @keyframes glowLine {
        0% { box-shadow: 0 0 10px #00eaff; }
        50% { box-shadow: 0 0 26px #ae00ff; }
        100% { box-shadow: 0 0 10px #00eaff; }
    }
</style>
</head>

<body>

    <div class="wrapper">
        
        <!-- Your logo file -->
        <img class="logo" src="logo.png.jpg" alt="SADA Logo" />

        <h1>SADA</h1>
        <div class="coming-soon">COMING SOON</div>
        <p class="tagline">AI Appointment Setter – Modern. Intelligent. Automated.</p>

        <div class="line"></div>
    </div>

</body>
</html>

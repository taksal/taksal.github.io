<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SADA – AI Appointment Setter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Inter', sans-serif;
        text-align: center;
        color: white;
    }

    .logo {
        width: 260px;
        height: auto;
        animation: glow 4s ease-in-out infinite;
    }

    @keyframes glow {
        0%   { filter: drop-shadow(0 0 8px #00eaff); }
        50%  { filter: drop-shadow(0 0 25px #ae00ff); }
        100% { filter: drop-shadow(0 0 8px #00eaff); }
    }

    h1 {
        margin-top: 30px;
        font-size: 3.5rem;
        font-weight: 900;
        background: linear-gradient(90deg, #00eaff, #ae00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p {
        margin-top: 10px;
        font-size: 1.4rem;
        opacity: 0.8;
        font-weight: 300;
    }
</style>
</head>

<body>

    <div>
        <!-- LOGO BASE64 EMBEDDED -->
        <img class="logo" src="logo.png" alt="SADA Logo" />

        <h1>SADA</h1>
        <p>AI Appointment Setter</p>
    </div>

</body>
</html>
